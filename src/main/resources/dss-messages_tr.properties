# =====================================================================
#  Mersel DSS Verifier — Türkçe yerelleştirme (DSS i18n)
#  ----- KAYNAK DOSYA (UTF-8) — geliştiriciler bunu düzenler -----
# =====================================================================
#
#  Bu dosya, Eclipse DSS validation pipeline'ının ürettiği BBB (Basic
#  Building Block) constraint mesajlarını Türkçe'ye çevirir. DSS,
#  standart Java {@link java.util.ResourceBundle} mekanizmasını kullanır:
#
#    Bundle adı : "dss-messages"
#    Yüklenme   : ResourceBundle.getBundle("dss-messages", locale)
#    Fallback   : dss-messages_tr_TR.properties
#                  ↓ (yoksa)
#                 dss-messages_tr.properties   ← BU DOSYA (build-time
#                                                 ASCII escape ile
#                                                 üretilen sürüm)
#                  ↓ (anahtar eksikse)
#                 dss-messages.properties      ← DSS jar default (English)
#
#  Bu sayede burada eksik bıraktığınız anahtarlar otomatik İngilizce
#  default ile gelir; çıktı asla boş olmaz, gradual translation
#  desteklenir.
#
# ---------------------------------------------------------------------
#  Build pipeline — UTF-8 → native2ascii (Unicode escape)
# ---------------------------------------------------------------------
#  Source-of-truth bu dosya: src/main/resources/dss-messages_tr.properties
#  (UTF-8 olarak depolanır — klasik Spring Boot resource konumu.)
#  • Geliştirici doğrudan UTF-8 olarak Türkçe karakterleri yazar
#    (İmza, Sertifika, güven, geçerlilik, ...). IDE'de temiz okunur.
#  • {@code pom.xml}'de {@code <build><resources>} bloğunda bu dosya
#    {@code maven-resources-plugin}'in default copy'sinden EXCLUDE
#    edilir; aksi halde UTF-8 byte'lar runtime'da mojibake'e
#    (örn. "GÃ¼ven" yerine "Güven") yol açardı.
#  • Maven build (`process-resources` phase'i) sırasında
#    {@code maven-antrun-plugin} + Apache Ant 1.10.x'in
#    {@code <native2ascii>} task'ı bu dosyayı okur, non-ASCII karakterleri
#    Unicode escape (\uXXXX) ile değiştirir ve
#    {@code target/classes/dss-messages_tr.properties} dosyasını üretir
#    (tek kanal = encoding tutarlılığı, IDE incremental build'lerde de).
#  • Çalışma zamanında {@link java.util.PropertyResourceBundle}
#    JVM'in encoding davranışından bağımsız olarak doğru çevirileri
#    okur — {@code ResourceBundle} ISO-8859-1 default'una düşse bile
#    Unicode escape'ler doğru çevrilir.
#  • Üretilen ASCII escape sürümü {@code target/} altında olduğundan
#    kaynak kontrolüne girmez; geliştirici hiçbir manuel native2ascii
#    pass'i çalıştırmak zorunda değildir.
#
#  Build hattı için bkz. {@code pom.xml} → maven-antrun-plugin
#  execution {@code utf8-properties-native2ascii}.
#
# ---------------------------------------------------------------------
#  Locale aktivasyonu
# ---------------------------------------------------------------------
#  application.properties (veya environment) içinde:
#
#    verification.i18n-locale=tr        # default
#
#  Bkz. {@link io.mersel.dss.verify.api.config.I18nProviderConfiguration}.
#
# ---------------------------------------------------------------------
#  Format kuralları
# ---------------------------------------------------------------------
#  • Java {@link java.text.MessageFormat} ile parse edilir.
#  • Placeholder'lar {0}, {1}, ... şeklinde — sayı ve sıra DSS jar'ındaki
#    İngilizce default ile birebir eşleşmeli (yoksa runtime
#    IllegalArgumentException).
#  • Bir mesajda apostrof (') geçecekse {@link MessageFormat} kuralı
#    gereği iki kere yazın: '' (tek ' geçirmek istemiyorsanız da yine ''
#    yazılır; aksi halde placeholder substitution bozulur).
#  • Türkçe karakterleri DOĞRUDAN yazın (İ, ı, ş, ğ, ü, ö, ç). Build
#    sırasında otomatik Unicode escape'lenir.
#
# ---------------------------------------------------------------------
#  Statik kodların durumu
# ---------------------------------------------------------------------
#  TRUSTED_SERVICE_STATUS, QUAL_HAS_GRANTED_AT_ANS gibi parametreli
#  mesajların {0} placeholder'ına DSS pipeline'ı bir ETSI URI veya enum
#  kodu (örn. http://uri.etsi.org/TrstSvc/Svcstatus/granted, REVOKED,
#  TOTAL_PASSED, vb.) geçirir. Bu URI/enum değerleri DSS tarafında
#  ÇEVRİLMEZ ve {@link io.mersel.dss.verify.api.models.FailedConstraint}
#  içindeki message alanında orijinal şekliyle görünür — frontend
#  tarafında lookup table ile zenginleştirilebilir.
#
# =====================================================================
#  Çeviri kapsamı : DSS 6.3 dss-messages.properties (823 anahtar)
# =====================================================================

