# Semantik (ETSI EN 319 102-1 v1.3.1, tablo 5)
SEMANTICS_TOTAL_PASSED=İmza doğrulama süreci aşağıdaki gerekçelerle TOTAL-PASSED ile sonuçlanır: biçim kontrolü başarılı; imzanın kriptografik kontrolleri başarılı (dolaylı imzalanmış bireysel veri nesnelerinin özet kontrolleri dahil); imzacının sertifikasına uygulanabilir tüm kısıtlamalar olumlu doğrulandı (örn. imzacı sertifikası güvenilir kabul edildi); ve imza, doğrulama kısıtlamalarına göre olumlu doğrulandı, dolayısıyla bu kısıtlamalara uygun kabul edilir.
SEMANTICS_TOTAL_FAILED=İmza doğrulama süreci, biçim kontrolünün başarısız olması, imzanın kriptografik kontrollerinin başarısız olması (dolaylı imzalanmış bireysel veri nesnelerinin özet kontrolleri dahil) veya imzacı sertifikasının imza üretim anında geçersiz olduğunun kanıtlanması nedeniyle TOTAL-FAILED ile sonuçlanır.
SEMANTICS_INDETERMINATE=Mevcut bilgi, imzanın TOTAL-PASSED veya TOTAL-FAILED olduğunu kesin olarak belirlemek için yeterli değil.

SEMANTICS_PASSED=Doğrulama süreci başarılı oldu
SEMANTICS_FAILED=Doğrulama süreci başarısız oldu

# Semantik (ETSI EN 319 102-1 v1.3.1, tablo 6)
# TOTAL-FAILED
SEMANTICS_FORMAT_FAILURE=İmza, kriptografik doğrulama yapı taşının işleyemeyeceği ölçüde, temel standartlardan birine uyumlu değil.
SEMANTICS_HASH_FAILURE=İmzalama sürecine dahil edilen imzalı veri nesnelerinden en az birinin özeti, imzadaki ilgili özet değeriyle eşleşmediği için imza doğrulama süreci TOTAL-FAILED ile sonuçlanır.
SEMANTICS_SIG_CRYPTO_FAILURE=İmzadaki imza değeri, imzacı sertifikasındaki imzacının açık anahtarı kullanılarak doğrulanamadığı için imza doğrulama süreci TOTAL-FAILED ile sonuçlanır.
SEMANTICS_REVOKED=İmzacı sertifikası iptal edilmiş ve imzanın iptal zamanından sonra oluşturulduğunun kanıtı olduğu için imza doğrulama süreci TOTAL-FAILED ile sonuçlanır.
SEMANTICS_EXPIRED=İmzanın, imzacı sertifikasının son kullanma tarihinden (notAfter) sonra oluşturulduğunun kanıtı olduğu için imza doğrulama süreci TOTAL-FAILED ile sonuçlanır.
SEMANTICS_NOT_YET_VALID=İmzanın, imzacı sertifikasının düzenlenme tarihinden (notBefore) önce oluşturulduğunun kanıtı olduğu için imza doğrulama süreci TOTAL-FAILED ile sonuçlanır.
# INDETERMINATE
SEMANTICS_SIG_CONSTRAINTS_FAILURE=İmzanın bir veya daha fazla niteliği doğrulama kısıtlamalarıyla eşleşmediği için imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_CHAIN_CONSTRAINTS_FAILURE=Doğrulama sürecinde kullanılan sertifika zinciri, sertifikayla ilgili doğrulama kısıtlamalarıyla eşleşmediği için imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_CERTIFICATE_CHAIN_GENERAL_FAILURE=Zincir doğrulaması için mevcut sertifika kümesi, belirsiz bir nedenle hata ürettiği için imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_CRYPTO_CONSTRAINTS_FAILURE=İmzayı doğrulamada kullanılan materyalde (örn. imza değeri, sertifika...) kullanılan algoritmalardan en az biri ya da böyle bir algoritmayla kullanılan anahtarın boyutu gerekli kriptografik güvenlik seviyesinin altında ve: bu materyal, algoritma/anahtarın güvenli kabul edildiği zamandan sonra üretilmiş (eğer böyle bir zaman biliniyorsa); ve materyal, algoritma/anahtarın güvenli kabul edildiği zamandan önce uygulanmış yeterince güçlü bir zaman damgası tarafından korunmuyorsa, imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_POLICY_PROCESSING_ERROR=Verilen resmi politika dosyası herhangi bir nedenle işlenemediği için (örn. erişilemez, parse edilemez, özet uyumsuzluğu vb.) imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_SIGNATURE_POLICY_NOT_AVAILABLE=Politikanın detaylarını içeren elektronik doküman erişilebilir olmadığı için imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_TIMESTAMP_ORDER_FAILURE=İmza zaman damgaları ve/veya imzalı veri nesnesi zaman damgalarının sırasıyla ilgili bazı kısıtlamalara uyulmadığı için imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_NO_SIGNING_CERTIFICATE_FOUND=İmzacı sertifikası tanımlanamadığı için imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_NO_CERTIFICATE_CHAIN_FOUND=Tanımlanan imzacı sertifikası için sertifika zinciri bulunamadığı için imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_REVOKED_NO_POE=İmzacı sertifikası doğrulama tarihinde/saatinde iptal edilmiş; ancak İmza Doğrulama Algoritması, imzalama zamanının iptal zamanından önce mi sonra mı olduğunu belirleyemediği için imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_REVOKED_CA_NO_POE=En az bir sertifika zinciri bulundu ama bir ara CA sertifikası iptal edilmiş olduğu için imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_OUT_OF_BOUNDS_NOT_REVOKED=İmzacı sertifikası doğrulama tarihinde/saatinde süresi dolmuş veya henüz geçerli değil; İmza Doğrulama Algoritması imzalama zamanının imzacı sertifikasının geçerlilik aralığı içinde olduğunu belirleyemiyor. Sertifikanın iptal edilmediği biliniyor.
SEMANTICS_OUT_OF_BOUNDS_NO_POE=İmzacı sertifikası doğrulama tarihinde/saatinde süresi dolmuş veya henüz geçerli değil; İmza Doğrulama Algoritması imzalama zamanının imzacı sertifikasının geçerlilik aralığı içinde olduğunu belirleyemediği için imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_REVOCATION_OUT_OF_BOUNDS_NO_POE=İmzanın imzacı sertifikasının iptal bilgisinin imzacı sertifikası, doğrulama tarihinde/saatinde süresi dolmuş veya henüz geçerli değil; İmza Doğrulama Algoritması iptal bilgisinin düzenlenme zamanının söz konusu iptal bilgisinin imzacı sertifikasının geçerlilik aralığı içinde olduğunu belirleyemiyor.
SEMANTICS_CRYPTO_CONSTRAINTS_FAILURE_NO_POE=İmzayı doğrulamada yer alan nesnelerde (örn. imza değeri, sertifika vb.) kullanılan algoritmalardan en az biri ya da böyle bir algoritmayla kullanılan anahtarın boyutu gerekli kriptografik güvenlik seviyesinin altında ve bu materyalin algoritma/anahtarın güvenli kabul edildiği zamandan önce üretildiğine dair bir kanıt olmadığı için imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_NO_POE=İmzalı bir nesnenin tehlike yaratan bir olaydan (örn. bozulan algoritma) önce üretildiğini kesin olarak belirlemek için bir varlık kanıtı (POE) eksik olduğu için imza doğrulama süreci INDETERMINATE ile sonuçlanır.
SEMANTICS_TRY_LATER=Mevcut bilgilerle tüm kısıtlamalar karşılanamadığı için imza doğrulama süreci INDETERMINATE ile sonuçlanır. Ancak ileride erişilebilir olacak ek iptal bilgisiyle bu mümkün olabilir.
SEMANTICS_SIGNED_DATA_NOT_FOUND=İmzalı veri elde edilemediği için imza doğrulama süreci INDETERMINATE ile sonuçlanır.
