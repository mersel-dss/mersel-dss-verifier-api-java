# Server Configuration
server.port=${SERVER_PORT:8086}

# OpenAPI Configuration (Scalar UI)
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# JSON Serialization - global NON_NULL inclusion
# Tum response siniflarimiz zaten class-level @JsonInclude(NON_NULL) tasiyor;
# bu ayar default'u global olarak da NON_NULL yapar - yeni model eklenirken
# annotation unutulsa bile null alanlar JSON'a yazilmaz (kontrat istikrari).
spring.jackson.default-property-inclusion=non_null

# Logging Configuration
logging.config=classpath:logback-spring.xml
logging.file.path=${LOG_PATH:./logs}
logging.level.root=${LOG_LEVEL:INFO}
logging.level.io.mersel.dss.verify.api=${LOG_LEVEL:INFO}

# Application Info
spring.application.name=mersel-dss-verify-api
info.app.name=Mersel DSS Verify API
info.app.description=Dijital Imza Dogrulama Servisi API
info.app.version=@project.version@

# CORS Configuration
# Production ortaminda spesifik domain'ler kullanin
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
cors.max-age=${CORS_MAX_AGE:3600}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.health.defaults.enabled=true
management.info.env.enabled=true

# Prometheus Metrics Configuration
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.tags.application=${spring.application.name}

# ============================================
# Verification Configuration (Environment Variables)
# ============================================

# --- Guvenilir Kok Sertifika Resolver Konfigurasyonu ---
# Resolver tipi: "kamusm-online", "kamusm-offline" veya "certificate-folder"
# - kamusm-online: Internet uzerinden KamuSM XML deposunu yukler
# - kamusm-offline: Yerel dosya sisteminden KamuSM XML deposunu yukler
# - certificate-folder: Belirtilen klasordeki tum .crt/.cer dosyalarini yukler
trusted.root.resolver.type=${TRUSTED_ROOT_RESOLVER_TYPE:kamusm-online}

# --- KamuSM XML Depo Online Resolver ---
# KamuSM XML deposu URL'i (online resolver icin)
kamusm.root.url=${KAMUSM_ROOT_URL:http://depo.kamusm.gov.tr/depo/SertifikaDeposu.xml}

# --- Otomatik Yenileme Cron ---
# Tum resolver'lar icin ortak otomatik yenileme cron ifadesi
# Offline ve folder resolver'larda da calisir ancak basarisiz olursa onceki sertifikalar korunur
trusted.root.refresh-cron=${TRUSTED_ROOT_REFRESH_CRON:0 15 3 * * *}

# --- KamuSM XML Depo Offline Resolver ---
# KamuSM XML dosya yolu (offline resolver icin)
# Ornek: file:/path/to/SertifikaDeposu.xml veya classpath:kamusm/SertifikaDeposu.xml
kamusm.root.offline.path=${KAMUSM_ROOT_OFFLINE_PATH:}

# --- Certificate Folder Resolver ---
# Sertifika klasoru yolu (certificate-folder resolver icin)
# Bu klasordeki tum .crt, .cer ve .pem dosyalari guvenilir kok sertifika olarak yuklenir
# Ornek: file:/path/to/certificates veya /absolute/path/to/certificates
trusted.root.cert.folder.path=${TRUSTED_ROOT_CERT_FOLDER_PATH:}

# Sertifika deposu (zorunlu) - JKS formatinda sertifika deposu yolu
verification.certstore.path=${CERTSTORE_PATH:}
verification.certstore.password=${CERTSTORE_PASSWORD:}

# --- Custom Root Certificates ---
# KamuSM disinda ozel root sertifikalar kullanmak icin
verification.custom-root-cert-path=${CUSTOM_ROOT_CERT_PATH:}

# --- Online Certificate Validation ---
# OCSP ve CRL kontrollerinin yapilip yapilmayacagi.
#
# Politika-davranis matrisi:
#   dss.policy.profile=strict        --> Tum katmanlarda revocation FAIL.
#                                        ONLINE_VALIDATION_ENABLED=true ZORUNLU,
#                                        aksi halde her dogrulama
#                                        INDETERMINATE/NO_REVOCATION_DATA doner.
#   dss.policy.profile=signer-strict --> Imzaci icin FAIL, ara CA WARN.
#                                        Default true; offline test/dev icin
#                                        false yapilabilir (uyari loglanir).
#   dss.policy.path=<custom XML>     --> Operator sorumlulugunda. Daha hafif
#                                        bir policy mount edip burayi false
#                                        yapmak supported senaryodur.
#
# false ise OCSP, CRL ve AIA bean'leri context'e hic yaratilmaz; tek bir HTTP
# istegi disari cikmaz. Hassas / hava-bosluklu ortamlar icin guvenli secenek.
verification.online-validation-enabled=${ONLINE_VALIDATION_ENABLED:true}

# --- Revocation (OCSP/CRL) Cache + HTTP Konfigurasyonu ---
# Resmi dogrulama akisinda her sertifika icin OCSP responder veya CRL
# distribution point'ine HTTP istegi atilir. Tekrar eden imzalar (orn. bir
# e-Fatura paketi icindeki seri imzalar) icin ayni token'i tekrar fetch
# etmek hem latans hem KamuSM uclerine yuk yaratir. Caffeine in-memory
# cache ile ayni token'i tek seferde cekiyoruz.
#
# TTL stratejisi: token'in kendi nextUpdate alanini taban aliriz; default
# TTL bir UST sinirdir (iptal'i gec gormeyelim diye). Ornegin nextUpdate
# 7 gun sonra ise default TTL=3600s (1 saat) sayesinde token max 1 saat
# cache'te kalir.

# Cache'te tutulacak maks revocation token sayisi (OCSP ve CRL ayri).
# 10K ~50MB civari heap; uretimde sorun cikarmaz.
verification.revocation.cache.max-size=${REVOCATION_CACHE_MAX_SIZE:10000}

# Default TTL (saniye). Geriye donuk uyumluluk: CRL_CACHE_TTL set edilmisse
# onun degeri kullanilir, degilse 3600 (1 saat).
verification.revocation.cache.ttl-seconds=${REVOCATION_CACHE_TTL:${CRL_CACHE_TTL:3600}}

# HTTP connection timeout (ms). Responder'a baglanma asamasi.
verification.revocation.http.connection-timeout-ms=${REVOCATION_HTTP_CONNECT_TIMEOUT_MS:10000}

# HTTP socket / read timeout (ms). CRL'ler MB seviyesinde olabildiginden
# cok dusuk tutmuyoruz.
verification.revocation.http.socket-timeout-ms=${REVOCATION_HTTP_SOCKET_TIMEOUT_MS:10000}

# --- Revocation Retry (OCSP/CRL Transient Hata Toleransi) ---
# Strict policy (signer-strict / strict) revocation verisini ZORUNLU
# isaretler — tek bir KamuSM 503 / connection reset gecerli bir e-Faturayi
# INDETERMINATE/NO_REVOCATION_DATA'ya dusurur. Retry mekanizmasi anlik
# flake'i gercek kesintilerden ayirir:
#
#   - Anlik flake (KamuSM 200ms-1s icinde toparlaniyor) -> retry basarili,
#     imza VALID kalir.
#   - Gercek kesinti (endpoint dakikalarca down) -> tum retry'lar bitince
#     son hata yukseltilir, LoggingCachingOCSPSource null doner, DSS
#     RevocationDataAvailable=FAIL kuralini tetikler -> imza FAIL.
#
# Algoritma: exponential backoff + jitter.
#   delay(n)  = min(initialBackoff * multiplier^(n-1), maxBackoff)
#   sleepMs   = delay * (1 + uniform(-jitterRatio, +jitterRatio))
#
# Worst-case bir token icin: maxAttempts * httpTimeout + sum(backoffs)
#   Default: 3 * 10s + (0.2s + 0.4s) ~ 30.6s (cok agir kesintide).
#   Tipik flake: 0.2-0.4s extra latency (1 retry yetiyor).

# Master switch. false yapilirsa maxAttempts=1 (sadece ilk deneme) gibi
# davranir; decorator wiring devre disi kalir.
verification.revocation.retry.enabled=${REVOCATION_RETRY_ENABLED:true}

# Toplam attempt sayisi: 1 = retry yok; 3 = 1 ilk deneme + 2 retry.
# KamuSM uclerini bombalamamak icin >=5 default kabul edilmez.
verification.revocation.retry.max-attempts=${REVOCATION_RETRY_MAX_ATTEMPTS:3}

# Ilk retry oncesi temel bekleme suresi (ms).
verification.revocation.retry.initial-backoff-ms=${REVOCATION_RETRY_INITIAL_BACKOFF_MS:200}

# Backoff ust siniri (ms). Exponential growth bu degere clamp'lenir.
verification.revocation.retry.max-backoff-ms=${REVOCATION_RETRY_MAX_BACKOFF_MS:2000}

# Her retry'da onceki backoff'un carpani. 1.0 = sabit backoff; 2.0 = ikiye katla.
verification.revocation.retry.backoff-multiplier=${REVOCATION_RETRY_BACKOFF_MULTIPLIER:2.0}

# Jitter orani (±N oraninda rastgele varyasyon). 0.2 = ±%20.
# Thundering herd onleme: ayni anda dusen N istemci ayni retry penceresine
# carpip endpoint'i tekrar bombalamasin diye.
verification.revocation.retry.jitter-ratio=${REVOCATION_RETRY_JITTER_RATIO:0.2}

# --- Strict Validation Mode ---
# Strict mode: SubIndication varsa veya timestamp hatasi varsa imza gecersiz sayilir
# Relaxed mode: DSS DiagnosticData'sini oldugu gibi gecirir
# (Not: Bu DSS policy XML degil; rapor seviyesi katiliktir. DSS validation
#  policy icin asagidaki dss.policy.* property'lerini kullanin.)
verification.strict-mode=${VERIFICATION_STRICT_MODE:true}

# --- TR Legacy XAdES SignedProperties Type URI Toleransi ---
# KamuSM / GIB ekosistemindeki bazi eski imzalama araclari, XAdES Reference
# Type URI'sini standart disi yaziyor:
#   Yanlis:    http://uri.etsi.org/01903/v1.3.2/XAdES.xsd#SignedProperties
#   Standart:  http://uri.etsi.org/01903#SignedProperties
# DSS bu varyanti tanimadigi icin kriptografik olarak SAGLAM imzalari da
# INDETERMINATE / SIG_CONSTRAINTS_FAILURE ile reddeder. TUBITAK Imzager ve
# KamuSM tarafi ise bu imzalari kabul ediyor.
#
# Tolerans aktif iken SADECE su tum kosullar saglandiginda override yapilir:
#   1) Indication = INDETERMINATE
#   2) SubIndication = SIG_CONSTRAINTS_FAILURE
#   3) DSS DiagnosticData: signatureIntact && signatureValid
#   4) BBB SAV'da yalniz BBB_SAV_ISQPMDOSPP FAIL ediyor
#   5) Original XML'de "01903 .. XAdES.xsd .. #SignedProperties" pattern bulunuyor
# Diger SIG_CONSTRAINTS_FAILURE durumlari (zayif algoritma, vb.) yine reddedilir.
#
# eIDAS-QES paralelinde davranmak isteyen operatorler false yapabilir.
verification.tr-legacy-xades-tolerance-enabled=${TR_LEGACY_XADES_TOLERANCE:true}

# --- XAdES Tek Referansli Imza (Missing SignedProperties Reference) ---
# XAdES imza yalnizca bir ds:Reference tasiyor; <xades:SignedProperties>
# elementi mevcut fakat hicbir <ds:Reference> ona pointing degil. ETSI EN
# 319 132-1 (XAdES-BES) iki referans (biri body, biri SignedProperties)
# zorunlulugu ihlali. SigningTime, SigningCertificate ve diger
# SignedProperties alanlari kriptografik olarak korunmadigi icin
# post-signing manipulasyona acik.
#
# Imza INVALID doner. Detector patolojiyi tespit ederse, yanit
# zenginlestirme icin RejectionCode MDSS-XADES-LEGACY-TR-MISSING-SP-REFERENCE
# SignatureInfo.appliedRejections altina yazilir; operator DSS'in jenerik
# SIG_CONSTRAINTS_FAILURE'i yerine somut Mersel tani koduyla nedeni gorur.
#
# Cozum dogrulayici tarafinda degil, imzayi ureten yazilim tarafindadir:
# iki referans uretilmelidir.
#
# Bu flag yalnizca rejection enrichment'i (Mersel tani kodu uretimini)
# kontrol eder; imzanin INVALID davranisini DEGISTIRMEZ. Kapali iken
# detector patolojiyi tespit etse de AppliedRejection objesi uretilmez
# ve DSS'in jenerik SIG_CONSTRAINTS_FAILURE'i tek basina raporlanir.
verification.tr-legacy-xades-rejection-enrichment-enabled=${TR_LEGACY_XADES_REJECTION_ENRICHMENT:true}

# NOT: v2.0/v2.1'de buraya iki property daha eklenmisti:
#   verification.tr-legacy-xades-re-validation-enabled
#   verification.tr-legacy-xades-re-validation-fail-closed
# Cryptographic re-validation katmani (Type URI normalize edip DSS'i
# yeniden cagirma) tasarim hatasi nedeniyle v2.2'de kaldirildi:
# <ds:Reference Type="..."> attribute degeri SignedInfo bloğu icinde
# yer aldigi icin imza kapsamindadir; byte stream'inde degistirmek
# canonical SignedInfo'yu degistirir ve SignatureValue artik gecersiz
# olur (SIG_CRYPTO_FAILURE). Gercek P1/P2 vakalarda layer her zaman
# pattardi. Gate v2.2 allow-list-only mantiga dustu; allow-list 8
# katmanli suzgeciyle yeterli guveni saglar. Eski environment
# variable'lari (TR_LEGACY_XADES_RE_VALIDATION,
# TR_LEGACY_XADES_RE_VALIDATION_FAIL_CLOSED) artik OKUNMAZ; Spring
# Boot bilinmeyen property'leri sessizce yok sayar.

# --- AIA (Authority Information Access) Cache ---
# Ara CA sertifikalarinin fetch sonuclari Caffeine cache'de tutulur.
# KamuSM ekosisteminde aktif ara CA sayisi cok dusuk (<=20 endpoint),
# 256 default haftalarca rahat yeter. Ara CA gecerlilik suresi yillarca
# oldugu icin 24 saat TTL tamamen guvenli.
verification.aia.cache.max-size=${AIA_CACHE_MAX_SIZE:256}
verification.aia.cache.ttl-seconds=${AIA_CACHE_TTL_SECONDS:86400}

# --- DSS i18n Locale (Dogrulama Mesajlari Dili) ---
# DSS validation pipeline'ı tüm BBB constraint mesajlarını
# (BBB_XCV_ISCGKU, TRUSTED_SERVICE_STATUS, vb.) bu locale ile doldurur.
# Bundle adı 'dss-messages'; Java ResourceBundle fallback chain:
#   dss-messages_tr.properties (bizim TR çevirimiz, src/main/resources)
#     → dss-messages.properties (DSS jar default — English)
# Eksik bıraktığınız anahtarlar otomatik İngilizce'ye fallback eder.
#
# Geçerli değerler: tr, en, en-US, fr, de, tr-TR (BCP-47 tag).
# Geçersiz tag girilirse startup'ta WARN log'u düşer ve default 'tr'
# kullanılır — sessiz İngilizce'ye düşmek operatörü yanıltabilir.
#
# TR çeviri eklemek için: src/main/resources/dss-messages_tr.properties
verification.i18n-locale=${VERIFICATION_I18N_LOCALE:tr}

# --- Timestamp Verification Configuration ---
# Zaman damgasi dogrulama icin guvenilir zaman damgasi otoriteleri
verification.trusted-tsa-certificates=${TRUSTED_TSA_CERTIFICATES:}

# --- Cache Configuration ---
# Sertifika ve CRL cache suresi (saniye)
# Not: CERT_CACHE_TTL ve CRL_CACHE_TTL environment variable'lardan okunur (default: 3600)

# ============================================
# DSS Validation Policy
# ============================================
# Built-in policy profili. Gecerli degerler:
#   signer-strict (DEFAULT) — Imzaci icin OCSP/CRL FAIL,
#                             ara CA icin WARN, TS signing cert WARN.
#                             Mali Muhur / KamuSM uretim default'u.
#   strict                  — eIDAS-QES paraleli, her katmanda FAIL.
#                             Online CRL/OCSP altyapisi calisirken kullanin.
dss.policy.profile=${DSS_POLICY_PROFILE:signer-strict}

# Tam custom validation policy XML kaynagi (Spring Resource paterni).
# Set edilirse dss.policy.profile IGNORE edilir.
# Ornekler:
#   classpath:policy/my-custom.xml
#   file:/etc/mersel-dss-verify/policy.xml
#   http://config-server/dss-policy.xml
# Bos birakilirsa dss.policy.profile devreye girer.
dss.policy.path=${DSS_POLICY_PATH:}

# ============================================
# INVALID Signature Webhook / Slack Notification
# ============================================
# Bir imza dogrulama sonucu INVALID oldugunda konfigure edilmis generic
# webhook ve/veya Slack incoming webhook'una async (fire-and-forget)
# bildirim gonderir.
#
# Aktivasyon kurali (en pratik kombinasyon: tek env var ile aciliyor):
#   - Generic webhook  -> INVALID_SIGNATURE_WEBHOOK_URL set edilince aktif
#   - Slack            -> INVALID_SIGNATURE_SLACK_WEBHOOK_URL set edilince aktif
#   - Master switch    -> INVALID_SIGNATURE_NOTIFICATION_ENABLED=false ile
#                         URL'leri sökmeden geçici susturma
#
# Generic webhook payload sema'si (JSON, NON_NULL):
#   {
#     "event": "invalid-signature",
#     "source": "mersel-dss-verify-api/<version>",
#     "notificationTime": "<ISO-8601>",
#     "file": {
#       "name": "...",
#       "sizeBytes": 12345,
#       "contentType": "application/xml",
#       "sha256Hex": "...",
#       "base64Content": "...",            // opsiyonel; bkz. asagidaki flag'ler
#       "contentOmittedReason": "..."      // base64 yokken neden ("EXCLUDED_BY_CONFIG" veya "EXCEEDED_MAX_SIZE")
#     },
#     "originalDocument": { ... },          // detached imza icin (XAdES); CAdES/PAdES'te null
#     "result": { ...VerificationResult... } // DSS sonucu olduğu gibi
#   }
#
# Slack payload: Block Kit formatinda zenginlestirilmis chat mesaji
# (header + summary fields + hata listesi + per-signature blok).
# Base64 icerik ASLA Slack'e gitmez (chat icin anlamsiz + 40k limit).
#
# Bildirim hatalari dogrulama akisini ASLA bozmaz; yalniz WARN loglanir.
notification.invalid-signature.enabled=${INVALID_SIGNATURE_NOTIFICATION_ENABLED:true}

# Generic webhook URL (operatorun kendi alert/ticket/audit sistemi).
# Bos birakilirsa generic webhook tetiklenmez.
# Ornek: https://alerts.example.com/hooks/mersel-dss
notification.invalid-signature.webhook.url=${INVALID_SIGNATURE_WEBHOOK_URL:}

# Slack incoming webhook URL'i — INVALID alarm mesajini Block Kit formatinda
# (kirmizi yan seritli attachment) ilgili Slack kanalina basar.
# Bos birakilirsa Slack mesaj tetiklenmez (bot file upload bagimsiz calisir).
# Ornek: https://hooks.slack.com/services/T.../B.../...
notification.invalid-signature.slack.webhook.url=${INVALID_SIGNATURE_SLACK_WEBHOOK_URL:}

# --- Slack Bot File Upload (opsiyonel, supplementary) ---
# INVALID imzada dogrulanan dosya Slack kanalina INDIRILEBILIR EK olarak da
# yuklenebilir. Bunun icin yeni 3-adimli Slack API'sini kullaniyoruz
# (files.upload Kasim 2025'te sunset edildi):
#   1) files.getUploadURLExternal  -> upload_url + file_id
#   2) <upload_url>'e raw bytes POST
#   3) files.completeUploadExternal -> dosyayi kanala paylas
#
# Hem token hem channel ID set edilmedikce upload tetiklenmez.
# Token bot user OAuth token'i olmali (xoxb-...); scope: files:write.
# Channel ID kanal ADI degil, Slack ID formatinda (C0123456789).
# Dosya boyutu max-content-size-bytes esigini asarsa upload atlanir.
notification.invalid-signature.slack.bot.token=${INVALID_SIGNATURE_SLACK_BOT_TOKEN:}
notification.invalid-signature.slack.bot.channel=${INVALID_SIGNATURE_SLACK_CHANNEL:}

# --- Slack-Only / Single-URL Modu: Inline Base64 (KUCUK DOSYA SENARYOSU) ---
#
# UYARI - BOYUT KARARI:
#   Tipik fatura/sozlesme imzalari 50KB-1MB araligindadir. Slack mesaj
#   toplam char limiti 40,000 SERT bir kisitlama; base64 expansion 4/3x
#   ile bu limit BINARY boyutta yaklasik 28KB'a karsilik gelir:
#     binary x 4/3 + Block Kit/code-fence overhead <= 40,000 char
#     ----------------------------------------------
#       8KB binary => ~10,900 char  (~5 chunk; default, guvenli)
#      28KB binary => ~37,300 char  (~14 chunk; UST SINIR, dikkatli ayarla)
#     250KB binary => ~333,000 char (Slack 400 invalid_blocks ile REDDEDER)
#
#   Bu yuzden inline mod YALNIZCA dosyalarin <=28KB oldugu deployment'lar
#   icindir (ornek: XAdES tek-imzali kucuk UBL, kucuk e-Mustahsil, POC
#   ortamlari). 28KB+ tipik fatura/PDF imzalari icin BU MODU KULLANMAYIN -
#   "Slack Bot File Upload" (yukaridaki bolume bakin) Slack
#   ekosisteminin ICINDE kalan dogru cozumdur: dosya files.slack.com'a
#   yuklenir, kanalda native dosya olarak gorunur, mobile'de tek-tik
#   download, 1GB'a kadar destek.
#
# Bu modun KULLANIM SENARYOSU:
#   - Operatorun Slack uygulamasi + bot token + files:write scope
#     kuramayacagi senaryolar (kurumsal IT politikasi, hizli POC, kucuk
#     ekip) VE dosyalarin <=28KB oldugu durum. Operator yalniz tek bir
#     Slack incoming webhook URL'i set eder, harici depo veya bot/scope
#     yonetimi gerekmez.
#
# OPT-IN. Default false - chat'i base64 ile kirletmek UX'i bozar;
# operator bilincli olarak true yapmali. Bot upload yolundan TAMAMEN
# BAGIMSIZ: ikisi de set edilirse ikisi de tetiklenir (operatorun
# trade-off'u; tipik olarak ya birini ya digerini secersiniz).
#
# Davranis:
#   - Notifier base64 string'i otomatik olarak ~2700 char'lik parcalara
#     boler ve birden fazla section block'a basar (Block Kit
#     per-section text limiti 3000 char). Block Kit mesaj basina 50
#     blok izin verir; 8KB icin ~5 blok, 28KB icin ~14 blok yeterli.
#   - Dosya boyutu inline-base64-max-bytes ustundeyse inline atlanir;
#     yerine mesajda "boyut limit asildi" notice satiri gorunur (sessiz
#     drop YOK, operator chat'te nedeni gorur ve bot upload onerisini
#     okur).
#
# Alici tarafi base64 chunk'larini sirayla concat edip decode eder:
#   macOS:  pbpaste | base64 -d > signed.bin
#   Linux:  xclip -o | base64 -d > signed.bin
# Tek section'a sigan kucuk dosyalar icin code block icindeki tum
# karakterleri secip dogrudan decode etmek de yeterli.
notification.invalid-signature.slack.inline-base64-enabled=${INVALID_SIGNATURE_SLACK_INLINE_BASE64_ENABLED:false}
notification.invalid-signature.slack.inline-base64-max-bytes=${INVALID_SIGNATURE_SLACK_INLINE_BASE64_MAX_BYTES:8192}

# --- Webhook HMAC Secret (opsiyonel ama uretimde ONERILIR) ---
# Generic webhook receiver'inin "bu istek gercekten Mersel'den mi geldi?"
# sorusuna cevap vermesini saglar. Set edilirse Mersel her webhook
# POST'una su header'lari ekler:
#   X-Mersel-Webhook-Id        UUID, her delivery icin essiz (idempotency)
#   X-Mersel-Webhook-Timestamp Unix epoch saniye (replay protection)
#   X-Mersel-Event             "invalid-signature" (event tipi)
#   X-Mersel-Signature         sha256=<hex>
#                              = HMAC-SHA256("<timestamp>.<rawBody>", secret)
#
# Receiver tarafinda:
#   1) Timestamp pencerede mi? (ornek: 5 dakika tolerans)
#   2) HMAC kendi secret'iyla yeniden hesapla; constant-time compare et
#   3) Webhook-Id ile DB'de tekrar kontrolu (idempotency)
#
# Slack icin ayri secret YOK — Slack incoming webhook URL'inin kendisi
# resmi secret'tir; HMAC header'i Slack tarafinda parse edilemez.
notification.invalid-signature.webhook.secret=${INVALID_SIGNATURE_WEBHOOK_SECRET:}

# Dogrulanan dokumanın base64 icerigi generic webhook payload'una dahil
# edilsin mi? Default ACIK — operatör forensik icin icerigi gormek ister.
# Gizlilik baskinsa (mali muhur / PII tasiyan PDF) kapatılır; yalniz
# metadata (name, size, sha256Hex) gider. Slack kanalı icin ALAKASIZ.
notification.invalid-signature.include-content=${INVALID_SIGNATURE_NOTIFICATION_INCLUDE_CONTENT:true}

# Bayt cinsinden ust sinir. Bu esikten buyuk dokumanlar icin
# base64Content payload'a hic eklenmez — yalniz hash + metadata gider.
# Default 10MB; receiver tarafi cok buyuk payload kabul etmiyor olabilir
# veya operator trafigi sinirlamak isteyebilir.
notification.invalid-signature.max-content-size-bytes=${INVALID_SIGNATURE_NOTIFICATION_MAX_CONTENT_SIZE_BYTES:10485760}

# HTTP connect timeout (ms) — receiver TCP handshake asamasi icin.
# Default 5s; bildirim asla dogrulama latency'sini yutmamali.
notification.invalid-signature.connect-timeout-ms=${INVALID_SIGNATURE_NOTIFICATION_CONNECT_TIMEOUT_MS:5000}

# HTTP read timeout (ms) — receiver yavas yanit verirse iki paket arasi
# beklenecek azami sure. Default 10s.
notification.invalid-signature.read-timeout-ms=${INVALID_SIGNATURE_NOTIFICATION_READ_TIMEOUT_MS:10000}
