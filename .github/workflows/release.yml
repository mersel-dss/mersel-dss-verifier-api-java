#
# Release — `vX.Y.Z` tag push'unda tetiklenir.
#
# Üretilen asset'ler (her release'e attach edilir):
#   1. mersel-dss-verify-api-X.Y.Z.jar      — executable Spring Boot fat-jar
#   2. mersel-dss-verify-api-X.Y.Z-bom.xml  — CycloneDX SBOM (XML)
#   3. mersel-dss-verify-api-X.Y.Z-bom.json — CycloneDX SBOM (JSON)
#   4. SHA256SUMS.txt                        — yukarıdakilerin sha256
#      checksums'ı; integrity verification için.
#
# Workflow tek seferde:
#   - Tag'in pom.xml versiyonu ile eşleştiğini doğrular (drift koruması).
#   - JDK 8 ile build (CI / runtime ile birebir).
#   - Build sırasında JAR'a provenance metadata gömer (git SHA, build-time,
#     reproducible outputTimestamp) — pom.xml'deki mersel.build.* property'leri.
#   - PUBLIC release açar; release notes otomatik generate'lenir + CHANGELOG
#     `[X.Y.Z]` bölümü body'ye eklenir. Stable tag'ler `make_latest=true`
#     ile "Latest" rozeti alır; `-rc`, `-beta` gibi suffix'liler otomatik
#     pre-release olarak işaretlenir.
#
# Manuel tetikleme: workflow_dispatch ile mevcut bir tag'i (örn. `v1.0.0`)
# tekrar release edebilirsin (önce mevcut release'i sil).
#
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag adı (vX.Y.Z formatında). Var olan tag yeniden release edilir.'
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish (JDK 8)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF##*/}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "::error::Tag formatı vX.Y.Z[-suffix] olmalı: '$TAG'"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG (version: $VERSION)"

      - name: Checkout (tagged ref)
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Verify pom.xml version matches tag
        shell: bash
        run: |
          POM_VERSION=$(mvn --batch-mode --no-transfer-progress -q \
            -Dexec.executable=echo \
            -Dexec.args='${project.version}' \
            --non-recursive exec:exec 2>/dev/null | tail -n 1)
          if [ "$POM_VERSION" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::pom.xml version ($POM_VERSION) tag ile uyuşmuyor (${{ steps.tag.outputs.version }}). Tag atmadan önce pom.xml'i bump'la."
            exit 1
          fi
          echo "pom.xml version $POM_VERSION = tag — tamam."

      - name: Determine reproducible build timestamp
        id: ts
        shell: bash
        run: |
          BUILD_TS=$(git log -1 --format=%cI HEAD)
          echo "build_ts=$BUILD_TS" >> "$GITHUB_OUTPUT"
          echo "Reproducible build timestamp: $BUILD_TS"

      - name: Build & test (provenance metadata gömülü)
        env:
          BUILD_REV:  ${{ github.sha }}
          BUILD_NUM:  ${{ github.run_number }}
          BUILD_TS:   ${{ steps.ts.outputs.build_ts }}
          BUILD_HOST: ${{ runner.os }}-${{ runner.arch }}
        run: |
          mvn --batch-mode --no-transfer-progress verify \
            -Dmersel.build.revision="${BUILD_REV}" \
            -Dmersel.build.number="${BUILD_NUM}" \
            -Dmersel.build.timestamp="${BUILD_TS}" \
            -Dmersel.build.host="${BUILD_HOST}" \
            -Dproject.build.outputTimestamp="${BUILD_TS}"

      - name: Stage release assets
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.tag.outputs.version }}"
          ARTIFACT_BASE="mersel-dss-verify-api-${VERSION}"
          mkdir -p release-assets

          # 1) Executable Spring Boot fat-jar (repackage sonrası ana JAR;
          #    *.original thin-jar değil).
          cp "target/${ARTIFACT_BASE}.jar" \
             "release-assets/${ARTIFACT_BASE}.jar"

          # 2) CycloneDX SBOM'lar (cyclonedx-maven-plugin package fazında üretir).
          cp target/bom.xml  "release-assets/${ARTIFACT_BASE}-bom.xml"
          cp target/bom.json "release-assets/${ARTIFACT_BASE}-bom.json"

          # 3) SHA-256 checksum dosyası (her release asset için).
          cd release-assets
          sha256sum "${ARTIFACT_BASE}.jar" \
                    "${ARTIFACT_BASE}-bom.xml" \
                    "${ARTIFACT_BASE}-bom.json" \
                    > SHA256SUMS.txt
          echo "asset-list:"
          ls -la

      - name: Extract CHANGELOG section for tag
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.tag.outputs.version }}"
          NOTES_FILE="release-notes.md"

          # CHANGELOG.md'den [X.Y.Z] bölümünü çıkar; sonraki ## başlığına kadar
          # olan satırları al. Bölüm yoksa generic mesaj.
          if grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > "$NOTES_FILE"
            echo "CHANGELOG section bulundu ve release notes'a yazıldı."
          else
            echo "## Sürüm $VERSION" > "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            echo "CHANGELOG.md'de \`[$VERSION]\` bölümü bulunamadı; otomatik generate edilen notları kullan." >> "$NOTES_FILE"
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "### Asset doğrulama"
            echo ""
            echo "Her asset'in SHA-256 checksum'ı \`SHA256SUMS.txt\` dosyasında ve aşağıda raporlanmıştır:"
            echo ""
            echo '```'
            cat release-assets/SHA256SUMS.txt
            echo '```'
            echo ""
            echo "### CycloneDX SBOM"
            echo ""
            echo "Schema v1.5, XML + JSON formatlarında. Downstream güvenlik tarayıcıları"
            echo "(\`grype sbom:./bom.json\`, \`syft\`, OWASP Dependency-Track) doğrudan tüketebilir."
          } >> "$NOTES_FILE"

          echo "notes-file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          make_latest: ${{ !contains(steps.tag.outputs.tag, '-') }}
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: true
          body_path: ${{ steps.notes.outputs.notes-file }}
          files: |
            release-assets/mersel-dss-verify-api-*.jar
            release-assets/mersel-dss-verify-api-*-bom.xml
            release-assets/mersel-dss-verify-api-*-bom.json
            release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: true
