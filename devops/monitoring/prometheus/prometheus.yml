global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'verify-api'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load rules
rule_files:
  - "alerts.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Verify API metrics
  # NOT: 'application' etiketini BİLİNÇLİ olarak burada set ETMİYORUZ.
  # Uygulama metriklerine Micrometer zaten
  # application="mersel-dss-verify-api" (spring.application.name) ekliyor.
  # Statik bir 'application: verify-api' etiketi eklemek çakışmaya ve
  # exported_application gölge etiketine yol açıyordu; tek doğruluk
  # kaynağı uygulamanın kendisidir. Sadece çakışmayan 'service' eklenir.
  - job_name: 'verify-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['verify-api:8086']
        labels:
          service: 'verification'
    scrape_interval: 10s
    scrape_timeout: 5s

  # NOT: Eski 'verify-api-health' job'ı kaldırıldı. /actuator/health JSON
  # döner (Prometheus text exposition değil); bu yüzden o job sürekli
  # parse hatası veriyordu. Servis ayakta mı sorusu zaten
  # up{job="verify-api"} ile ölçülüyor (ServiceDown alert'i bunu kullanır).
  # Bağımlılık/health detayı için blackbox_exporter eklenebilir.
