version: '3.8'

# Verify API Docker Compose Configuration
# For quick start: docker-compose up -d

services:
  # Verify API Service
  verify-api:
    build:
      context: ../../
      dockerfile: devops/docker/Dockerfile
    container_name: verify-api
    ports:
      - "8086:8086"
    environment:
      # Server Configuration
      - SERVER_PORT=8086
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_PATH=/app/logs
      
      # JVM Options
      - JAVA_OPTS=-Xmx1g -Xms512m -XX:+UseG1GC
      
      # TSL Validation (Optional)
      - TSL_REFRESH_CRON=${TSL_REFRESH_CRON:-0 0 2 * * ?}
      
      # CORS Configuration
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}

      # Signature validation behavior (defaults match application.properties).
      # Override in your .env file if you need to deviate from the TR-aware,
      # signer-strict baseline.
      - ONLINE_VALIDATION_ENABLED=${ONLINE_VALIDATION_ENABLED:-true}
      - VERIFICATION_STRICT_MODE=${VERIFICATION_STRICT_MODE:-true}
      - DSS_POLICY_PROFILE=${DSS_POLICY_PROFILE:-signer-strict}
      - DSS_POLICY_PATH=${DSS_POLICY_PATH:-}
      # Turkey-specific XAdES SignedProperties Type URI tolerance.
      # Default: true (KamuSM/GIB ecosystem parity with TUBITAK Imzager).
      # Set to false for strict eIDAS-QES behavior.
      - TR_LEGACY_XADES_TOLERANCE=${TR_LEGACY_XADES_TOLERANCE:-true}
      # NOT: v2.0/v2.1'de buraya bir TR_LEGACY_XADES_RE_VALIDATION env var
      # eklenmisti (cryptographic re-validation katmani). v2.2'de katman
      # tasarim hatasi nedeniyle kaldirildi (Type URI imza kapsaminda
      # oldugu icin byte stream'inde degistirmek SignatureValue'yi
      # bozar; layer her zaman SIG_CRYPTO_FAILURE dondururdu). Eski env
      # var artik OKUNMAZ; Spring Boot bilinmeyen property'leri sessizce
      # yok sayar. Gate v2.2 allow-list-only mantiga dustu.

      # ===================================================================
      # INVALID Signature Notifications (webhook + Slack)
      # ===================================================================
      # Tum env var'lar OPSIYONEL. Set edilmediginde notifier no-op'tur,
      # OkHttpClient bile yaratilmaz (gercek zero-overhead). Birini set
      # ederek istediginiz kanali aciyorsunuz. Tam dokumantasyon icin:
      # docs/notifications/HOW_TO_USE.md
      - INVALID_SIGNATURE_NOTIFICATION_ENABLED=${INVALID_SIGNATURE_NOTIFICATION_ENABLED:-true}
      # Generic webhook (operatorun kendi alert/ticket/audit sistemi):
      - INVALID_SIGNATURE_WEBHOOK_URL=${INVALID_SIGNATURE_WEBHOOK_URL:-}
      - INVALID_SIGNATURE_WEBHOOK_SECRET=${INVALID_SIGNATURE_WEBHOOK_SECRET:-}
      # Slack incoming webhook (kirmizi bantli alarm mesaji):
      - INVALID_SIGNATURE_SLACK_WEBHOOK_URL=${INVALID_SIGNATURE_SLACK_WEBHOOK_URL:-}
      # Slack bot file upload (250KB+ tipik fatura icin ONERILEN):
      - INVALID_SIGNATURE_SLACK_BOT_TOKEN=${INVALID_SIGNATURE_SLACK_BOT_TOKEN:-}
      - INVALID_SIGNATURE_SLACK_CHANNEL=${INVALID_SIGNATURE_SLACK_CHANNEL:-}
      # Slack-only inline base64 (sadece <=8KB dosyalar icin opt-in):
      - INVALID_SIGNATURE_SLACK_INLINE_BASE64_ENABLED=${INVALID_SIGNATURE_SLACK_INLINE_BASE64_ENABLED:-false}
      - INVALID_SIGNATURE_SLACK_INLINE_BASE64_MAX_BYTES=${INVALID_SIGNATURE_SLACK_INLINE_BASE64_MAX_BYTES:-8192}
      # Gizlilik (PII/Mali Muhur): false yaparsan base64 webhook'a gitmez.
      - INVALID_SIGNATURE_NOTIFICATION_INCLUDE_CONTENT=${INVALID_SIGNATURE_NOTIFICATION_INCLUDE_CONTENT:-true}
      - INVALID_SIGNATURE_NOTIFICATION_MAX_CONTENT_SIZE_BYTES=${INVALID_SIGNATURE_NOTIFICATION_MAX_CONTENT_SIZE_BYTES:-10485760}
    volumes:
      # Mount test documents (development)
      - ../../resources/test-documents:/app/test-documents:ro
      # For production: mount your actual documents directory
      # - /path/to/production/documents:/app/documents:ro
      # Mount logs (optional)
      - ../../logs:/app/logs
      # Mount certificates for validation (optional)
      - ../../devops/docker/certs:/app/certs:ro
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - verify-api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clock-panel
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AlertManager (Optional)
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - monitoring
    restart: unless-stopped
    profiles:
      - monitoring-full
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:

